<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Basketball Game - Haunted Crypto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-muted: rgba(255, 255, 255, 0.3);
            --accent-gold: #F7931A;
            --accent-gold-glow: rgba(247, 147, 26, 0.4);
            --accent-green: #00FF88;
            --accent-green-glow: rgba(0, 255, 136, 0.4);
            --accent-red: #FF3B5C;
            --accent-red-glow: rgba(255, 59, 92, 0.4);
            --accent-cyan: #00D4FF;
            --accent-cyan-glow: rgba(0, 212, 255, 0.3);
            --accent-orange: #FF8C00;
            --accent-orange-glow: rgba(255, 140, 0, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
        }

        .header-logo span {
            font-weight: 700;
            font-size: 16px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .balance {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
        }

        .balance-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            overflow: hidden;
        }

        .balance-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Content */
        .content {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 24px;
            padding: 8px 0;
            transition: color 0.2s ease;
            font-family: inherit;
            text-decoration: none;
        }

        .back-btn:hover {
            color: var(--text-primary);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Page title */
        .page-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Basketball Game */
        .basketball-container {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 24px;
            margin-top: 20px;
        }

        .basketball-game {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Video Container - 3:4 aspect ratio */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 3 / 4;
            background: var(--bg-secondary);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

        .game-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
            pointer-events: none;
        }

        /* Video overlay for fade effect */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            transition: background-color 0.5s ease;
            pointer-events: none;
            z-index: 10;
        }

        .video-overlay.fade {
            background: rgba(0, 0, 0, 0.9);
        }

        /* Bet Controls */
        .bet-controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bet-input-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .bet-input {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 14px 18px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .bet-input:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        .bet-input::placeholder {
            color: var(--text-muted);
        }

        .bet-quick-btns {
            display: flex;
            gap: 8px;
        }

        .bet-quick-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .bet-quick-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Button Styles */
        .btn {
            border: none;
            border-radius: 14px;
            padding: 16px 24px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            width: 100%;
        }

        .btn-basketball {
            background: linear-gradient(135deg, var(--accent-orange), #FF6B00);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-orange-glow), inset 0 0 30px rgba(255, 140, 0, 0.3);
            border: 2px solid rgba(255, 140, 0, 0.5);
            position: relative;
        }

        .btn-basketball::before {
            content: '';
            position: absolute;
            inset: 4px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.2), rgba(255, 107, 0, 0.1));
            z-index: -1;
        }

        .btn-basketball:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-orange-glow), inset 0 0 40px rgba(255, 140, 0, 0.4);
        }

        .btn-basketball:active {
            transform: scale(0.98);
        }

        .btn-basketball:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Game Status */
        .game-status {
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            min-height: 24px;
        }

        .game-status.waiting {
            color: var(--text-secondary);
        }

        .game-status.playing {
            color: var(--accent-orange);
        }

        .game-status.win {
            color: var(--accent-green);
            text-shadow: 0 0 20px var(--accent-green-glow);
        }

        .game-status.lose {
            color: var(--accent-red);
            text-shadow: 0 0 20px var(--accent-red-glow);
        }

        /* Result Display */
        .result-display {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }

        .result-display.show {
            display: block;
        }

        .result-amount {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .result-amount.win {
            color: var(--accent-green);
        }

        .result-amount.lose {
            color: var(--accent-red);
        }

        .result-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Basketball Icon in Button */
        .basketball-icon {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 8px;
            vertical-align: middle;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 14px 24px;
            border-radius: 14px;
            z-index: 1001;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 500;
            font-size: 14px;
            max-width: 90%;
            text-align: center;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .notification.success {
            border-color: var(--accent-green);
            box-shadow: 0 4px 20px var(--accent-green-glow);
        }

        .notification.error {
            border-color: var(--accent-red);
            box-shadow: 0 4px 20px var(--accent-red-glow);
        }

        /* Loading indicator */
        .loading-indicator {
            display: none;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
        }

        .loading-indicator.show {
            display: flex;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .content {
                padding: 16px;
            }
            
            .bet-input-group {
                flex-direction: column;
                align-items: stretch;
            }
            
            .bet-quick-btns {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-logo">
            <img src="https://i.postimg.cc/d0SRpZ44/fvyca.jpg" alt="Logo">
            <span>Haunted Crypto</span>
        </div>
        <div class="balance">
            <div class="balance-icon"><img src="https://i.postimg.cc/3wqZcfBT/fvyca.png" alt="coin"></div>
            <span id="headerBalance">150,000</span>
        </div>
    </header>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <!-- Content -->
    <main class="content">
        <a href="index.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Назад к играм
        </a>

        <h1 class="page-title">🏀 Basketball</h1>
        <p class="page-subtitle">Попади в корзину и удвой свою ставку!</p>

        <div class="basketball-container">
            <div class="basketball-game">
                <!-- Game Status -->
                <div class="game-status waiting" id="gameStatus">
                    Сделайте ставку и бросайте мяч!
                </div>

                <!-- Video Container -->
                <div class="video-container" id="videoContainer">
                    <div class="video-overlay" id="videoOverlay"></div>
                </div>

                <!-- Bet Controls -->
                <div class="bet-controls">
                    <div class="bet-input-group">
                        <input 
                            type="number" 
                            class="bet-input" 
                            id="betInput" 
                            placeholder="Сумма ставки" 
                            min="10" 
                            max="100000" 
                            value="1000"
                        >
                        <div class="bet-quick-btns">
                            <button class="bet-quick-btn" onclick="setBet(500)">500</button>
                            <button class="bet-quick-btn" onclick="setBet(1000)">1K</button>
                            <button class="bet-quick-btn" onclick="setBet(5000)">5K</button>
                            <button class="bet-quick-btn" onclick="setBet(10000)">10K</button>
                        </div>
                    </div>
                    
                    <button class="btn btn-basketball" id="shootBtn" onclick="shootBasket()">
                        <img src="https://emojio.ru/images/apple-b/1f3c0.png" alt="🏀" class="basketball-icon">
                        Поставить и бросить
                    </button>
                </div>

                <!-- Result Display -->
                <div class="result-display" id="resultDisplay">
                    <div class="result-amount" id="resultAmount">+2,000</div>
                    <div class="result-text" id="resultText">Отличный бросок!</div>
                </div>

                <!-- Loading Indicator -->
                <div class="loading-indicator" id="loadingIndicator">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Game State
        let gameState = {
            balance: 150000,
            isPlaying: false
        };

        // Game Configuration
        const gameConfig = {
            winChance: 0.45,
            winMultiplier: 2.0,
            videos: {
                waiting: 'https://allwebs.ru/images/2026/04/13/fdb0a97a78527bc6229d8775552238c8.mp4',
                win: 'https://allwebs.ru/images/2026/04/13/2643a44a8936ba482d6c4bb425bb906b.mp4',
                lose: 'https://allwebs.ru/images/2026/04/13/0e8d48de4d68eaf067ab04ba6ce2aa3a.mp4'
            },
            fadeDelay: 500,
            gameVideoDuration: 9000
        };

        // DOM Elements
        const videoContainer = document.getElementById('videoContainer');
        const videoOverlay = document.getElementById('videoOverlay');
        const betInput = document.getElementById('betInput');
        const shootBtn = document.getElementById('shootBtn');
        const gameStatus = document.getElementById('gameStatus');
        const resultDisplay = document.getElementById('resultDisplay');
        const resultAmount = document.getElementById('resultAmount');
        const resultText = document.getElementById('resultText');
        const loadingIndicator = document.getElementById('loadingIndicator');

        // Current video element reference
        let currentVideo = null;

        // Load state from localStorage
        function loadState() {
            const saved = localStorage.getItem('hauntedCryptoState');
            if (saved) {
                const savedState = JSON.parse(saved);
                gameState.balance = savedState.balance || 150000;
                updateBalanceDisplay();
            }
        }

        // Save state to localStorage
        function saveState() {
            const saved = localStorage.getItem('hauntedCryptoState');
            let savedState = saved ? JSON.parse(saved) : {};
            savedState.balance = gameState.balance;
            localStorage.setItem('hauntedCryptoState', JSON.stringify(savedState));
        }

        // Update balance display
        function updateBalanceDisplay() {
            const formatted = formatNumber(gameState.balance);
            document.getElementById('headerBalance').textContent = formatted;
        }

        // Format number
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification ' + type + ' show';
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Set bet amount
        function setBet(amount) {
            betInput.value = amount;
        }

        // Validate bet
        function validateBet(amount) {
            if (isNaN(amount) || amount <= 0) {
                showNotification('Введите корректную сумму ставки', 'error');
                return false;
            }
            
            if (amount < 10) {
                showNotification('Минимальная ставка: 10 монет', 'error');
                return false;
            }
            
            if (amount > 100000) {
                showNotification('Максимальная ставка: 100,000 монет', 'error');
                return false;
            }
            
            if (amount > gameState.balance) {
                showNotification('Недостаточно средств', 'error');
                return false;
            }
            
            return true;
        }

        // Create a video element with all necessary attributes
        function createVideoElement(src, loop = false) {
            const video = document.createElement('video');
            video.className = 'game-video';
            video.muted = true;
            video.playsInline = true;
            video.autoplay = true;
            video.preload = 'auto';
            video.loop = loop;
            video.disablePictureInPicture = true;
            
            // Disable all controls and interactions
            video.controls = false;
            video.controlsList = 'nodownload nofullscreen noremoteplayback noplaybackrate';
            
            // Prevent context menu
            video.oncontextmenu = (e) => {
                e.preventDefault();
                return false;
            };
            
            // Prevent seeking - reset to current playback position
            let lastTime = 0;
            video.ontimeupdate = () => {
                // Only allow forward progression within 1 second tolerance
                if (Math.abs(video.currentTime - lastTime) > 1 && lastTime > 0) {
                    video.currentTime = lastTime;
                } else {
                    lastTime = video.currentTime;
                }
            };
            
            // Prevent seeking via user interaction
            video.onseeking = () => {
                if (lastTime > 0) {
                    video.currentTime = lastTime;
                }
            };
            
            // Explicit loop handling for waiting video - restart from beginning when ended
            if (loop) {
                video.addEventListener('ended', () => {
                    video.currentTime = 0;
                    video.play().catch(err => {
                        console.log('Loop replay prevented:', err);
                    });
                });
            }
            
            video.src = src;
            return video;
        }

        // Change video with proper cleanup
        function changeVideo(videoUrl, loop = false) {
            return new Promise((resolve, reject) => {
                // Remove old video if exists
                if (currentVideo) {
                    currentVideo.pause();
                    currentVideo.src = '';
                    currentVideo.remove();
                    currentVideo = null;
                }
                
                // Create new video
                const newVideo = createVideoElement(videoUrl, loop);
                
                newVideo.onloadeddata = () => {
                    currentVideo = newVideo;
                    // Insert before overlay so overlay stays on top
                    videoContainer.insertBefore(newVideo, videoOverlay);
                    newVideo.play().catch(err => {
                        console.log('Autoplay prevented:', err);
                    });
                    resolve(newVideo);
                };
                
                newVideo.onerror = (e) => {
                    console.error('Error loading video:', videoUrl, e);
                    reject(new Error('Failed to load video'));
                };
                
                // Start loading
                newVideo.load();
            });
        }

        // Play fade transition
        function playFadeTransition() {
            return new Promise((resolve) => {
                videoOverlay.classList.add('fade');
                setTimeout(() => {
                    resolve();
                }, gameConfig.fadeDelay);
            });
        }

        // Remove fade
        function removeFade() {
            videoOverlay.classList.remove('fade');
        }

        // Main game function
        async function shootBasket() {
            if (gameState.isPlaying) return;
            
            const betAmount = parseInt(betInput.value);
            
            if (!validateBet(betAmount)) return;
            
            // Start game
            gameState.isPlaying = true;
            gameState.balance -= betAmount;
            updateBalanceDisplay();
            saveState();
            
            // Update UI
            shootBtn.disabled = true;
            shootBtn.textContent = 'Бросаем...';
            gameStatus.textContent = 'Мяч в полёте...';
            gameStatus.className = 'game-status playing';
            resultDisplay.classList.remove('show');
            
            // Determine result first
            const isWin = Math.random() < gameConfig.winChance;
            const resultVideoUrl = isWin ? gameConfig.videos.win : gameConfig.videos.lose;
            
            try {
                // Fade out current video
                await playFadeTransition();
                
                // Change to result video
                await changeVideo(resultVideoUrl, false);
                
                // Remove fade to show new video
                removeFade();
                
                // Wait for video to play, then handle end
                if (currentVideo) {
                    currentVideo.onended = async () => {
                        // Pause at end
                        currentVideo.pause();
                        
                        // Process result
                        processGameResult(isWin, betAmount);
                        
                        // Wait a moment to show result
                        setTimeout(async () => {
                            // Fade out
                            await playFadeTransition();
                            
                            // Return to waiting video
                            await changeVideo(gameConfig.videos.waiting, true);
                            
                            // Remove fade
                            removeFade();
                            
                            // Reset game
                            resetGame();
                        }, 2000);
                    };
                }
                
            } catch (error) {
                console.error('Game error:', error);
                showNotification('Ошибка игры. Попробуйте ещё раз', 'error');
                
                // Return bet on error
                gameState.balance += betAmount;
                updateBalanceDisplay();
                saveState();
                
                // Try to restore waiting video
                try {
                    await changeVideo(gameConfig.videos.waiting, true);
                    removeFade();
                } catch (e) {
                    console.error('Failed to restore waiting video:', e);
                }
                
                resetGame();
            }
        }

        // Process game result
        function processGameResult(isWin, betAmount) {
            let winAmount = 0;
            if (isWin) {
                winAmount = Math.floor(betAmount * gameConfig.winMultiplier);
                gameState.balance += winAmount;
                updateBalanceDisplay();
                
                // Show win result
                gameStatus.textContent = 'Попадание! Вы выиграли!';
                gameStatus.className = 'game-status win';
                resultAmount.textContent = '+' + formatNumber(winAmount);
                resultAmount.className = 'result-amount win';
                resultText.textContent = 'Отличный бросок!';
                
                showNotification(`Вы выиграли ${formatNumber(winAmount)} монет!`, 'success');
            } else {
                // Show lose result
                gameStatus.textContent = 'Промах! Попробуйте ещё раз';
                gameStatus.className = 'game-status lose';
                resultAmount.textContent = '-' + formatNumber(betAmount);
                resultAmount.className = 'result-amount lose';
                resultText.textContent = 'Не попали в корзину';
                
                showNotification(`Вы потеряли ${formatNumber(betAmount)} монет`, 'error');
            }
            
            // Show result display
            resultDisplay.classList.add('show');
            
            // Save state
            saveState();
        }

        // Reset game to initial state
        function resetGame() {
            gameState.isPlaying = false;
            shootBtn.disabled = false;
            shootBtn.innerHTML = '<img src="https://emojio.ru/images/apple-b/1f3c0.png" alt="🏀" class="basketball-icon">Поставить и бросить';
            gameStatus.textContent = 'Сделайте ставку и бросайте мяч!';
            gameStatus.className = 'game-status waiting';
            loadingIndicator.classList.remove('show');
        }

        // Initialize game
        async function initGame() {
            loadState();
            
            try {
                // Load initial waiting video (looped)
                await changeVideo(gameConfig.videos.waiting, true);
                console.log('Basketball game initialized');
            } catch (error) {
                console.error('Failed to initialize game:', error);
                showNotification('Ошибка инициализации игры', 'error');
            }
        }

        // Start game when page loads
        document.addEventListener('DOMContentLoaded', initGame);

        // Handle back navigation
        window.addEventListener('beforeunload', () => {
            saveState();
        });
    </script>
</body>
</html>
