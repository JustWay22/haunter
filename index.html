<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HAUNTER - Basketball Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-card: rgba(0, 0, 0, 0.04);
            --bg-card-hover: rgba(0, 0, 0, 0.08);
            --border-color: rgba(0, 0, 0, 0.08);
            --text-primary: #000000;
            --text-secondary: rgba(0, 0, 0, 0.55);
            --text-muted: rgba(0, 0, 0, 0.3);
            --accent-orange: #FF6B00;
            --accent-orange-light: #FF8C3A;
            --accent-green: #34C759;
            --accent-red: #FF3B30;
            --tab-active: #FF6B00;
            --tab-inactive: #8E8E93;
            --glass-bg: rgba(255, 255, 255, 0.7);
        }

        body.dark {
            --bg-primary: #000000;
            --bg-secondary: #1C1C1E;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-hover: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-muted: rgba(255, 255, 255, 0.3);
            --tab-inactive: #8E8E93;
            --glass-bg: rgba(28, 28, 30, 0.7);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Content */
        .content {
            padding: 20px 16px 100px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* iOS 26 Style Glass Morphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        /* Profile Card */
        .profile-card {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-card-hover));
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            border: 0.5px solid var(--border-color);
        }

        /* Avatar */
        .avatar-container {
            position: relative;
            cursor: pointer;
        }

        .avatar-outer-glow {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B00, #FFB347);
            padding: 3px;
            box-shadow: 0 0 25px rgba(255, 107, 0, 0.4), 0 0 50px rgba(255, 107, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar-outer-glow:hover {
            transform: scale(1.03);
            box-shadow: 0 0 35px rgba(255, 107, 0, 0.6);
        }

        .avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            background: var(--bg-secondary);
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-upload-hint {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #FF6B00;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            border: 3px solid var(--bg-primary);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        /* Player Info */
        .player-info {
            flex: 1;
        }

        .player-label {
            font-size: 13px;
            color: var(--accent-orange);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .player-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
            cursor: pointer;
            display: inline-block;
        }

        .edit-icon {
            display: inline-block;
            margin-left: 8px;
            opacity: 0.5;
            cursor: pointer;
            font-size: 14px;
        }

        /* Stats Section */
        .stats-section {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .balance-box {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 8px 16px;
            text-align: center;
        }

        .balance-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .balance-amount {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent-orange);
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: none;
            border-radius: 30px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s;
        }

        /* Game Container */
        .game-container {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 0.5px solid var(--border-color);
        }

        .video-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            aspect-ratio: 3 / 4;
            background: var(--bg-secondary);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .game-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0);
            transition: background-color 0.5s ease;
            pointer-events: none;
            z-index: 10;
        }

        .video-overlay.fade {
            background: rgba(0, 0, 0, 0.9);
        }

        /* Bet Controls */
        .bet-controls {
            margin-top: 16px;
        }

        .bet-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .bet-input {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
        }

        .bet-input:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        .bet-quick-btns {
            display: flex;
            gap: 8px;
        }

        .bet-quick-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 10px 16px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .bet-quick-btn:active {
            transform: scale(0.95);
        }

        .btn-basketball {
            background: linear-gradient(135deg, #FF6B00, #FF8C3A);
            border: none;
            border-radius: 18px;
            padding: 16px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-basketball:active {
            transform: scale(0.98);
        }

        .btn-basketball:disabled {
            opacity: 0.5;
            transform: none;
        }

        .game-status {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            padding: 8px;
            border-radius: 20px;
        }

        .result-display {
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }

        .result-display.show {
            display: block;
        }

        .result-amount {
            font-size: 28px;
            font-weight: 800;
        }

        .result-amount.win { color: #34C759; }
        .result-amount.lose { color: #FF3B30; }

        /* Bottom Navigation Bar - iOS Style */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 10px 20px 28px 20px;
            border-top: 0.5px solid var(--border-color);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 8px 24px;
            border-radius: 30px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item.active {
            background: var(--accent-orange);
        }

        .nav-icon {
            font-size: 26px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .nav-item.active .nav-label {
            color: white;
        }

        /* Profile Page - iOS 26 Style */
        .profile-page {
            display: none;
            padding: 20px 16px 100px 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .profile-page.show {
            display: block;
        }

        .game-page {
            display: block;
        }

        .game-page.hide {
            display: none;
        }

        /* iOS Cards */
        .ios-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            border: 0.5px solid var(--border-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 600;
            font-size: 17px;
        }

        .balance-large {
            font-size: 40px;
            font-weight: 800;
            color: var(--accent-orange);
            margin: 8px 0;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .action-btn {
            flex: 1;
            background: var(--accent-orange);
            border: none;
            border-radius: 30px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.97);
        }

        .action-btn.secondary {
            background: transparent;
            border: 1.5px solid var(--accent-orange);
            color: var(--accent-orange);
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 0.5px solid var(--border-color);
        }

        .stats-row:last-child {
            border-bottom: none;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 0.5px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-win {
            color: #34C759;
            font-weight: 700;
        }

        .history-lose {
            color: #FF3B30;
            font-weight: 700;
        }

        .history-date {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Modals */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1002;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            text-align: center;
        }

        .modal-content h3 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 16px;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 16px 0;
        }

        .avatar-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 16px;
            overflow: hidden;
            border: 3px solid #FF6B00;
        }

        .file-input-label {
            background: var(--bg-card);
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 14px;
            display: block;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .modal-btn.save {
            background: #FF6B00;
            color: white;
        }

        .modal-btn.cancel {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-secondary);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 1003;
            transition: transform 0.3s ease;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            .content { padding: 16px 12px 100px 12px; }
            .profile-card { flex-direction: column; text-align: center; }
            .stats-section { margin-left: 0; justify-content: center; }
            .bet-input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Game Page -->
    <div class="game-page" id="gamePage">
        <main class="content">
            <!-- Profile Card -->
            <div class="profile-card">
                <div class="avatar-container" id="avatarContainer">
                    <div class="avatar-outer-glow">
                        <div class="avatar-inner">
                            <img class="avatar" id="avatarImg" src="https://i.pravatar.cc/150?img=7" alt="Avatar">
                        </div>
                    </div>
                    <div class="avatar-upload-hint" id="uploadHint">📷</div>
                </div>
                <div class="player-info">
                    <div class="player-label">ИГРОК</div>
                    <div>
                        <span class="player-name" id="username">Игрок</span>
                        <span class="edit-icon" id="editNickBtn">✏️</span>
                    </div>
                </div>
                <div class="stats-section">
                    <div class="balance-box">
                        <div class="balance-label">БАЛАНС</div>
                        <div class="balance-amount" id="headerBalance">150,000</div>
                    </div>
                    <div class="theme-toggle" id="themeToggle">🌙</div>
                </div>
            </div>

            <!-- Game Container -->
            <div class="game-container">
                <div class="game-status waiting" id="gameStatus">
                    🏀 Сделайте ставку и бросайте мяч!
                </div>

                <div class="video-container" id="videoContainer">
                    <div class="video-overlay" id="videoOverlay"></div>
                </div>

                <div class="bet-controls">
                    <div class="bet-input-group">
                        <input type="number" class="bet-input" id="betInput" placeholder="Сумма ставки" min="10" max="100000" value="1000">
                        <div class="bet-quick-btns">
                            <button class="bet-quick-btn" onclick="setBet(500)">500</button>
                            <button class="bet-quick-btn" onclick="setBet(1000)">1K</button>
                            <button class="bet-quick-btn" onclick="setBet(5000)">5K</button>
                            <button class="bet-quick-btn" onclick="setBet(10000)">10K</button>
                        </div>
                    </div>
                    <button class="btn-basketball" id="shootBtn" onclick="shootBasket()">
                        🏀 Поставить и бросить
                    </button>
                </div>

                <div class="result-display" id="resultDisplay">
                    <div class="result-amount" id="resultAmount">+2,000</div>
                    <div class="result-text" id="resultText">Отличный бросок!</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Profile Page -->
    <div class="profile-page" id="profilePage">
        <div class="ios-card">
            <div class="card-header">
                <span>💰 Баланс</span>
                <span>💎</span>
            </div>
            <div class="balance-large" id="profileBalance">150,000</div>
            <div class="action-buttons">
                <button class="action-btn" id="depositBtn">💳 Пополнить</button>
                <button class="action-btn secondary" id="withdrawBtn">💸 Вывести</button>
            </div>
        </div>

        <div class="ios-card">
            <div class="card-header">
                <span>📊 Статистика</span>
                <span>🏆</span>
            </div>
            <div class="stats-row">
                <span>Всего ставок</span>
                <span id="totalBets" style="font-weight: 700;">0</span>
            </div>
            <div class="stats-row">
                <span>Выигрышей</span>
                <span id="totalWins" style="color: #34C759; font-weight: 700;">0</span>
            </div>
            <div class="stats-row">
                <span>Проигрышей</span>
                <span id="totalLosses" style="color: #FF3B30; font-weight: 700;">0</span>
            </div>
            <div class="stats-row">
                <span>Оборот средств</span>
                <span id="totalTurnover" style="font-weight: 700;">0</span>
            </div>
        </div>

        <div class="ios-card">
            <div class="card-header">
                <span>📜 История игр</span>
                <span>🕐</span>
            </div>
            <div id="historyList">
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">
                    🤝 История пуста
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav">
        <div class="nav-item active" data-tab="game">
            <div class="nav-icon">🏀</div>
            <div class="nav-label">Игры</div>
        </div>
        <div class="nav-item" data-tab="profile">
            <div class="nav-icon">👤</div>
            <div class="nav-label">Профиль</div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal" id="usernameModal">
        <div class="modal-content">
            <h3>👤 Изменить ник</h3>
            <input type="text" class="modal-input" id="usernameInput" placeholder="Введите ваш ник" maxlength="20">
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeUsernameModal()">Отмена</button>
                <button class="modal-btn save" onclick="saveUsername()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="modal" id="avatarModal">
        <div class="modal-content">
            <h3>📸 Загрузить аватар</h3>
            <div class="avatar-preview">
                <img id="avatarPreview" src="" alt="Preview" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <label class="file-input-label">
                📁 Выбрать изображение
                <input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/gif,image/webp">
            </label>
            <div class="modal-buttons">
                <button class="modal-btn cancel" onclick="closeAvatarModal()">Отмена</button>
                <button class="modal-btn save" onclick="saveAvatar()">Сохранить</button>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        // Game State
        let gameState = {
            balance: 150000,
            isPlaying: false,
            username: 'Игрок',
            avatarUrl: 'https://i.pravatar.cc/150?img=7',
            totalBets: 0,
            totalWins: 0,
            totalLosses: 0,
            totalTurnover: 0,
            history: []
        };

        let selectedAvatarFile = null;
        let currentVideo = null;
        let currentDelayTimeout = null;

        const gameConfig = {
            winChance: 0.45,
            winMultiplier: 2.0,
            videos: {
                waiting: 'https://allwebs.ru/images/2026/05/02/7f574ab1876dab4979626f5d5ffb9ef0.mp4',
                win: 'https://allwebs.ru/images/2026/05/02/03bb39c996c3cce6a10fcf4a8bc46c5a.mp4',
                lose: 'https://allwebs.ru/images/2026/05/02/0ffc346afe4b38f23b3d25fbe0500142.mp4'
            },
            fadeDelay: 500,
            gameVideoDelay: 3012
        };

        function loadState() {
            const saved = localStorage.getItem('haunterState');
            if (saved) {
                const savedState = JSON.parse(saved);
                gameState.balance = savedState.balance || 150000;
                gameState.username = savedState.username || 'Игрок';
                gameState.avatarUrl = savedState.avatarUrl || 'https://i.pravatar.cc/150?img=7';
                gameState.totalBets = savedState.totalBets || 0;
                gameState.totalWins = savedState.totalWins || 0;
                gameState.totalLosses = savedState.totalLosses || 0;
                gameState.totalTurnover = savedState.totalTurnover || 0;
                gameState.history = savedState.history || [];
                updateBalanceDisplay();
                updateProfileDisplay();
                updateStatsDisplay();
            }
        }

        function saveState() {
            const savedState = {
                balance: gameState.balance,
                username: gameState.username,
                avatarUrl: gameState.avatarUrl,
                totalBets: gameState.totalBets,
                totalWins: gameState.totalWins,
                totalLosses: gameState.totalLosses,
                totalTurnover: gameState.totalTurnover,
                history: gameState.history
            };
            localStorage.setItem('haunterState', JSON.stringify(savedState));
        }

        function updateBalanceDisplay() {
            const formatted = formatNumber(gameState.balance);
            document.getElementById('headerBalance').textContent = formatted;
            document.getElementById('profileBalance').textContent = formatted;
        }

        function updateProfileDisplay() {
            document.getElementById('username').textContent = gameState.username;
            document.getElementById('avatarImg').src = gameState.avatarUrl;
        }

        function updateStatsDisplay() {
            document.getElementById('totalBets').textContent = gameState.totalBets;
            document.getElementById('totalWins').textContent = gameState.totalWins;
            document.getElementById('totalLosses').textContent = gameState.totalLosses;
            document.getElementById('totalTurnover').textContent = formatNumber(gameState.totalTurnover);
            
            const historyDiv = document.getElementById('historyList');
            if (gameState.history.length === 0) {
                historyDiv.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">🤝 История пуста</div>';
            } else {
                historyDiv.innerHTML = gameState.history.slice().reverse().map(item => `
                    <div class="history-item">
                        <div>
                            <div class="history-date">${item.date}</div>
                            <div style="font-size: 13px; margin-top: 4px;">${item.result === 'win' ? '🎉 Победа' : '😔 Поражение'}</div>
                        </div>
                        <div class="${item.result === 'win' ? 'history-win' : 'history-lose'}">
                            ${item.result === 'win' ? '+' + formatNumber(item.amount) : '-' + formatNumber(item.amount)}
                        </div>
                    </div>
                `).join('');
            }
        }

        function addToHistory(result, amount) {
            const now = new Date();
            const dateStr = `${now.getDate().toString().padStart(2,'0')}.${(now.getMonth()+1).toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            gameState.history.push({ date: dateStr, result: result, amount: amount });
            if (gameState.history.length > 20) gameState.history.shift();
            updateStatsDisplay();
            saveState();
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification show';
            setTimeout(() => notification.classList.remove('show'), 2500);
        }

        function setBet(amount) { document.getElementById('betInput').value = amount; }

        function validateBet(amount) {
            if (isNaN(amount) || amount <= 0) { showNotification('Введите корректную сумму', 'error'); return false; }
            if (amount < 10) { showNotification('Минимальная ставка: 10 монет', 'error'); return false; }
            if (amount > 100000) { showNotification('Максимальная ставка: 100,000 монет', 'error'); return false; }
            if (amount > gameState.balance) { showNotification('Недостаточно средств', 'error'); return false; }
            return true;
        }

        function createVideoElement(src, loop = false) {
            const video = document.createElement('video');
            video.className = 'game-video';
            video.muted = true;
            video.playsInline = true;
            video.autoplay = true;
            video.preload = 'auto';
            video.loop = loop;
            video.disablePictureInPicture = true;
            video.controls = false;
            video.src = src;
            return video;
        }

        function changeVideo(videoUrl, loop = false) {
            return new Promise((resolve, reject) => {
                if (currentVideo) {
                    currentVideo.pause();
                    currentVideo.src = '';
                    currentVideo.remove();
                    currentVideo = null;
                }
                const newVideo = createVideoElement(videoUrl, loop);
                newVideo.onloadeddata = () => {
                    currentVideo = newVideo;
                    document.getElementById('videoContainer').insertBefore(newVideo, document.getElementById('videoOverlay'));
                    newVideo.play().catch(e => console.log(e));
                    resolve(newVideo);
                };
                newVideo.onerror = () => reject(new Error('Failed to load video'));
                newVideo.load();
            });
        }

        function playFadeTransition() {
            return new Promise((resolve) => {
                document.getElementById('videoOverlay').classList.add('fade');
                setTimeout(resolve, gameConfig.fadeDelay);
            });
        }

        function removeFade() { document.getElementById('videoOverlay').classList.remove('fade'); }

        async function shootBasket() {
            if (gameState.isPlaying) return;
            const betAmount = parseInt(document.getElementById('betInput').value);
            if (!validateBet(betAmount)) return;
            
            gameState.isPlaying = true;
            gameState.balance -= betAmount;
            gameState.totalBets++;
            gameState.totalTurnover += betAmount;
            updateBalanceDisplay();
            saveState();
            
            const shootBtn = document.getElementById('shootBtn');
            const gameStatus = document.getElementById('gameStatus');
            const resultDisplay = document.getElementById('resultDisplay');
            
            shootBtn.disabled = true;
            shootBtn.textContent = '🎯 Бросаем...';
            gameStatus.textContent = '🏀 Мяч в полёте...';
            gameStatus.className = 'game-status playing';
            resultDisplay.classList.remove('show');
            
            const isWin = Math.random() < gameConfig.winChance;
            const resultVideoUrl = isWin ? gameConfig.videos.win : gameConfig.videos.lose;
            
            try {
                await playFadeTransition();
                await changeVideo(gameConfig.videos.waiting, false);
                removeFade();
                await new Promise(resolve => { currentDelayTimeout = setTimeout(resolve, gameConfig.gameVideoDelay); });
                await playFadeTransition();
                await changeVideo(resultVideoUrl, false);
                removeFade();
                
                if (currentVideo) {
                    currentVideo.onended = async () => {
                        currentVideo.pause();
                        processGameResult(isWin, betAmount);
                        setTimeout(async () => {
                            await playFadeTransition();
                            await changeVideo(gameConfig.videos.waiting, true);
                            removeFade();
                            resetGame();
                        }, 2000);
                    };
                }
            } catch (error) {
                showNotification('Ошибка игры', 'error');
                gameState.balance += betAmount;
                updateBalanceDisplay();
                saveState();
                resetGame();
            }
        }

        function processGameResult(isWin, betAmount) {
            if (isWin) {
                const winAmount = Math.floor(betAmount * gameConfig.winMultiplier);
                gameState.balance += winAmount;
                gameState.totalWins++;
                updateBalanceDisplay();
                document.getElementById('gameStatus').textContent = '🎉 ПОПАДАНИЕ! Вы выиграли!';
                document.getElementById('gameStatus').className = 'game-status win';
                document.getElementById('resultAmount').textContent = '+' + formatNumber(winAmount);
                document.getElementById('resultAmount').className = 'result-amount win';
                document.getElementById('resultText').textContent = 'Отличный бросок! +' + formatNumber(winAmount);
                showNotification(`🎉 Вы выиграли ${formatNumber(winAmount)} монет!`);
                addToHistory('win', winAmount);
            } else {
                gameState.totalLosses++;
                document.getElementById('gameStatus').textContent = '💔 ПРОМАХ! Попробуйте ещё раз';
                document.getElementById('gameStatus').className = 'game-status lose';
                document.getElementById('resultAmount').textContent = '-' + formatNumber(betAmount);
                document.getElementById('resultAmount').className = 'result-amount lose';
                document.getElementById('resultText').textContent = 'Не попали в корзину -' + formatNumber(betAmount);
                showNotification(`😔 Вы проиграли ${formatNumber(betAmount)} монет`, 'error');
                addToHistory('lose', betAmount);
            }
            document.getElementById('resultDisplay').classList.add('show');
            updateStatsDisplay();
            saveState();
        }

        function resetGame() {
            if (currentDelayTimeout) clearTimeout(currentDelayTimeout);
            gameState.isPlaying = false;
            const shootBtn = document.getElementById('shootBtn');
            shootBtn.disabled = false;
            shootBtn.innerHTML = '🏀 Поставить и бросить';
            document.getElementById('gameStatus').textContent = '🏀 Сделайте ставку и бросайте мяч!';
            document.getElementById('gameStatus').className = 'game-status waiting';
        }

        function switchTab(tab) {
            const gamePage = document.getElementById('gamePage');
            const profilePage = document.getElementById('profilePage');
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tab}"]`).classList.add('active');
            
            if (tab === 'game') {
                gamePage.style.display = 'block';
                profilePage.classList.remove('show');
                profilePage.style.display = 'none';
            } else {
                gamePage.style.display = 'none';
                profilePage.style.display = 'block';
                profilePage.classList.add('show');
                updateStatsDisplay();
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const themeBtn = document.getElementById('themeToggle');
            themeBtn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
            localStorage.setItem('haunterTheme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }

        function openUsernameModal() {
            document.getElementById('usernameInput').value = gameState.username;
            document.getElementById('usernameModal').classList.add('show');
        }
        function closeUsernameModal() { document.getElementById('usernameModal').classList.remove('show'); }
        function saveUsername() {
            const newUsername = document.getElementById('usernameInput').value.trim();
            if (newUsername) {
                gameState.username = newUsername;
                updateProfileDisplay();
                saveState();
                showNotification('✨ Ник изменён!');
            }
            closeUsernameModal();
        }
        function openAvatarModal() {
            document.getElementById('avatarPreview').src = gameState.avatarUrl;
            document.getElementById('avatarModal').classList.add('show');
        }
        function closeAvatarModal() { document.getElementById('avatarModal').classList.remove('show'); }
        function saveAvatar() {
            if (selectedAvatarFile) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    gameState.avatarUrl = e.target.result;
                    updateProfileDisplay();
                    saveState();
                    showNotification('🖼️ Аватар обновлён!');
                    closeAvatarModal();
                };
                reader.readAsDataURL(selectedAvatarFile);
            } else closeAvatarModal();
        }

        function deposit() {
            const amount = prompt('💰 Введите сумму пополнения:', '1000');
            if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                gameState.balance += parseInt(amount);
                updateBalanceDisplay();
                saveState();
                showNotification(`✅ Пополнено на ${formatNumber(parseInt(amount))} монет!`);
            }
        }
        function withdraw() {
            const amount = prompt('💸 Введите сумму вывода:', '1000');
            if (amount && !isNaN(amount) && parseInt(amount) > 0) {
                if (parseInt(amount) <= gameState.balance) {
                    gameState.balance -= parseInt(amount);
                    updateBalanceDisplay();
                    saveState();
                    showNotification(`✅ Выведено ${formatNumber(parseInt(amount))} монет!`);
                } else showNotification('❌ Недостаточно средств!', 'error');
            }
        }

        async function initGame() {
            loadState();
            const savedTheme = localStorage.getItem('haunterTheme');
            if (savedTheme === 'dark') document.body.classList.add('dark');
            document.getElementById('themeToggle').textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
            
            document.getElementById('editNickBtn').addEventListener('click', openUsernameModal);
            document.getElementById('avatarContainer').addEventListener('click', openAvatarModal);
            document.getElementById('depositBtn').addEventListener('click', deposit);
            document.getElementById('withdrawBtn').addEventListener('click', withdraw);
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => switchTab(item.dataset.tab));
            });
            
            const fileInput = document.getElementById('avatarFileInput');
            fileInput.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    selectedAvatarFile = e.target.files[0];
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById('avatarPreview').src = event.target.result;
                    };
                    reader.readAsDataURL(selectedAvatarFile);
                }
            });
            
            try {
                await changeVideo(gameConfig.videos.waiting, true);
            } catch (error) { console.error(error); }
        }
        
        document.addEventListener('DOMContentLoaded', initGame);
        window.addEventListener('beforeunload', () => saveState());
    </script>
</body>
</html>
